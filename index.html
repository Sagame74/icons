<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Icons</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 20px;
  }

  .item {
    text-align: center;
  }

  .item img {
    width: 64px;
    height: 64px;
    object-fit: contain;
    display: block;
    margin: 0 auto 8px;
  }

  .item a {
    text-decoration: none;
    color: black;
    font-size: 14px;
  }
</style>
</head>

<body>

<div class="grid">

  <div class="item">
    <a href="Art-Emis.png">
      <img src="Art-Emis.png">
      Art-Emis
    </a>
  </div>

  <div class="item">
    <a href="ArenaIT.png">
      <img src="ArenaIT.png">
      ArenaIT
    </a>
  </div>

  <div class="item">
    <a href="Citatepedia2.png">
      <img src="Citatepedia2.png">
      Citatepedia
    </a>
  </div>

</div>

</body>
</html>
